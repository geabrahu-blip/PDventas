name: Despliegue a Firebase
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        
      - name: Instalar dependencias y Construir
        run: |
          npm install
          npm run build
          
      - name: Desplegar a Firebase
        run: npx firebase-tools@15.22.1 deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
